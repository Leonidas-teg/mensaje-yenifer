<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Yenifer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;

  background-image:url("fondo.png");
  background-repeat:no-repeat;
  background-position:center top;
  background-size:cover;
  background-attachment:scroll;
}

/* Capa ligera para contraste (muy equilibrada) */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25);
}

/* Contenedor */
.contenido{
  position:relative;
  z-index:2;
  max-width:750px;
  padding:40px;
  animation:fadeIn 2s ease forwards;
  opacity:0;
}

/* Título con mismo tono pero más nítido */
h1{
  font-size:2.3rem;
  margin-bottom:25px;
  font-weight:800;

  background:linear-gradient(45deg,#ff3cac,#784ba0,#ff3cac);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 8px rgba(255,60,172,0.9),
    0 0 15px rgba(120,75,160,0.7);

  animation:glow 3s ease-in-out infinite alternate;
}

/* Párrafo con efecto suave */
p{
  font-size:1.15rem;
  line-height:1.8;
  font-weight:300;

  color:#ffffff;

  text-shadow:
    0 0 6px rgba(255,60,172,0.6),
    0 0 12px rgba(120,75,160,0.4);

  animation:slideUp 2s ease forwards 1s;
  opacity:0;
}

/* Animaciones */

@keyframes fadeIn{
  to{opacity:1;}
}

@keyframes slideUp{
  from{
    transform:translateY(30px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

@keyframes glow{
  from{
    text-shadow:
      0 0 10px rgba(255,60,172,1),
      0 0 20px rgba(120,75,160,0.8);
  }
  to{
    text-shadow:
      0 0 18px rgba(255,60,172,1),
      0 0 35px rgba(120,75,160,1);
  }
}

/* Ajuste móvil real para reducir zoom */
@media (max-width:768px){

  body{
    background-size:cover;
    background-position:center top;
  }

  .contenido{
    padding:25px;
  }

  h1{
    font-size:1.7rem;
  }

  p{
    font-size:1rem;
  }

}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="contenido">
  <h1>Que tengas un hermoso día, Yenifer</h1>
  <p>
    No dejes de sonreírle a la vida.<br>
    Tienes una energía especial que ilumina todo a tu alrededor.<br>
    Hoy solo quería recordártelo.<br><br>
    Que tengas un día increíble…<br>
    y bastante BOOYAH 🔥
  </p>
</div>

</body>
</html>
