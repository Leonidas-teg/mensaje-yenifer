<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Yenifer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  overflow:hidden;

  background-image:url("fondo.png");
  background-repeat:no-repeat;
  background-position:center center;
  background-size:cover;
}

/* Capa oscura equilibrada (sin exagerar) */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.30);
}

/* Contenido */
.contenido{
  position:relative;
  z-index:2;
  max-width:750px;
  padding:40px;
}

h1{
  font-size:2.2rem;
  margin-bottom:25px;
  font-weight:600;
}

p{
  font-size:1.15rem;
  line-height:1.8;
  font-weight:300;
}

/* Optimización móvil real */
@media (max-width:768px){

  body{
    background-position:center top;
    background-size:cover;
  }

  .contenido{
    padding:25px;
  }

  h1{
    font-size:1.6rem;
  }

  p{
    font-size:1rem;
  }

}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="contenido">
  <h1>Que tengas un hermoso día, Yenifer</h1>
  <p>
    No dejes de sonreírle a la vida.<br>
    Tienes una energía especial que ilumina todo a tu alrededor.<br>
    Hoy solo quería recordártelo.<br><br>
    Que tengas un día increíble…<br>
    y bastante BOOYAH 🔥
  </p>
</div>

</body>
</html>
